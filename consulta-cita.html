<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta tu cita | Fisio Salud</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/node_modules/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="home.css">
  <link rel="stylesheet" href="consulta-cita.css">
</head>
<body class="home-body">
  <header class="site-header">
    <div class="site-shell nav-shell">
      <a class="brand-mark" href="/">
        <img id="brand-logo" src="/assets/logo.png" alt="Fisio Salud Clinica la Paz">
      </a>

      <button id="nav-toggle" class="nav-toggle" type="button" aria-label="Abrir menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav id="site-nav" class="site-nav">
        <span id="public-link-group">
          <a href="/">Inicio</a>
          <a href="/#conocenos">Conocenos</a>
          <a href="/#servicios">Servicios</a>
          <a href="/#contactanos">Contactanos</a>
          <span class="nav-with-submenu">
            <a href="/agendamiento">Agenda tu cita</a>
            <div class="nav-submenu">
              <a href="/consulta-cita">Consulta tu cita</a>
            </div>
          </span>
        </span>
        <span id="role-link-group"></span>
        <span id="welcome-status" class="welcome-status"></span>
        <a id="login-link" href="/login">Login</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="shell">
      <section class="card">
        <div class="card-head">
          <div>
            <p class="section-label">Consulta</p>
            <h2>Consulta o ajusta tu cita</h2>
          </div>
          <span class="badge">Controla tus citas online</span>
        </div>

        <form id="lookup-form" novalidate>
          <div class="grid lookup-grid">
            <label class="field field-cedula">
              <span>Cédula</span>
              <input id="lookup-cedula" type="text" inputmode="numeric" maxlength="10" autocomplete="off" placeholder="Ingresa 10 dígitos" required>
              <small class="hint">Puedes escribir la cédula y pulsar buscar para ver tus citas.</small>
              <small class="error" id="lookup-error"></small>
            </label>
            <div class="lookup-actions">
              <button id="lookup-button" type="submit" class="secondary-button action-button">
                <span class="button-main">Buscar citas</span>
                <span class="button-sub">Consulta, reagenda o cancela</span>
              </button>
            </div>
          </div>
        </form>

        <p id="lookup-status" class="form-message neutral">No se ha buscado ninguna cédula aún.</p>

        <div class="results-card">
          <div class="results-container" id="appointments-container">
            <p class="results-placeholder">
              Ingresa una cédula válida para ver las citas agendadas.
            </p>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="auth.js"></script>
  <script src="shared-nav.js"></script>
  <script src="/node_modules/flatpickr/dist/flatpickr.min.js"></script>
  <script src="/node_modules/flatpickr/dist/l10n/es.js"></script>
  <script src="consulta-cita.js"></script>
</body>
</html>
